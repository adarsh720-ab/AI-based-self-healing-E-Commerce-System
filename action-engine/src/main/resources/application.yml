server:
  port: 8092
  shutdown: graceful

spring:
  application:
    name: action-engine

  datasource:
    url: jdbc:postgresql://localhost:5432/action_db
    username: postgres
    password: postgres
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          min-idle: 1
          max-active: 8

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: action-engine-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ecommerce.action.event"
        spring.json.add.type.headers: false
      max-poll-records: 10
    listener:
      concurrency: 3
      ack-mode: record

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

action:
  cooldown:
    ttl-seconds: 300
  docker:
    stub-mode: true
