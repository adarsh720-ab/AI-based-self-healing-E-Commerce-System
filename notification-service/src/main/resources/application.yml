spring:
  application:
    name: notification-service
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: notification-service-group
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: com.ecommerce.commons.event

server:
  port: 8086

sendgrid:
  api:
    key: ${SENDGRID_API_KEY:SG.dummy}

twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID:ACdummy}
  auth:
    token: ${TWILIO_AUTH_TOKEN:dummy}
  phone:
    number: ${TWILIO_PHONE_NUMBER:+1234567890}

management:
  endpoints:
    web:
      exposure:
        include: health,info

