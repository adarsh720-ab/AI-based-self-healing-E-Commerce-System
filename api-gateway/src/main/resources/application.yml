spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8089
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<path>.*), /api/auth/$\{path}

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<path>.*), /api/users/$\{path}

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**
          filters:
            - RewritePath=/api/products/(?<path>.*), /api/products/$\{path}

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<path>.*), /api/orders/$\{path}

        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/payments/**
          filters:
            - RewritePath=/api/payments/(?<path>.*), /api/payments/$\{path}

        - id: inventory-service
          uri: http://inventory-service:8085
          predicates:
            - Path=/api/inventory/**
          filters:
            - RewritePath=/api/inventory/(?<path>.*), /api/inventory/$\{path}

        - id: delivery-service
          uri: http://delivery-service:8087
          predicates:
            - Path=/api/deliveries/**
          filters:
            - RewritePath=/api/deliveries/(?<path>.*), /api/deliveries/$\{path}

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Content-Type
              - Authorization
            allow-credentials: true
            max-age: 3600

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890AbcDef}

management:
  endpoints:
    web:
      exposure:
        include: health,info

