# ── ml-service (Python/FastAPI) ───────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: ecommerce/ml-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
            - name: KAFKA_INPUT_TOPIC
              value: "service-logs"
            - name: KAFKA_OUTPUT_TOPIC
              value: "anomaly-events"
            - name: KAFKA_GROUP_ID
              value: "ml-anomaly-detector"
            - name: KAFKA_AUTO_OFFSET
              value: "latest"
            - name: MODEL_DIR
              value: "app/model"
            - name: ANOMALY_THRESHOLD
              value: "-0.05"
            - name: SERVICE_PORT
              value: "8090"
            - name: ENVIRONMENT
              value: "prod"
            - name: MAX_ANOMALY_HISTORY
              value: "1000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: ecommerce
spec:
  selector:
    app: ml-service
  ports:
    - port: 8090
      targetPort: 8090
  type: ClusterIP
