spring:
  application:
    name: ai-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/ai_db
    username: ${DB_USER:enter your username}
    password: ${DB_PASS:enter your password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      pool-name: ai-service-pool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ai-service-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ecommerce.commons.event
        spring.json.add.type.headers: false

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: qwen2.5:7b
        options:
          temperature: 0.1
          top-p: 0.9
          num-predict: 500
    prompts:
      system: >
        You are an expert Java microservices engineer specializing in
        Spring Boot, Apache Kafka, and distributed systems.
        Your job is to analyze anomaly events from a production
        e-commerce platform and provide root cause analysis.
        Always respond with ONLY a valid JSON object — no explanation,
        no markdown, no extra text.

server:
  port: 8091

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ecommerce: DEBUG